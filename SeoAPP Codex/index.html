<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Content Lab</title>
  <style>
    :root {
      --bg: #f4efe5;
      --panel: rgba(255, 252, 247, 0.88);
      --panel-strong: #fffaf2;
      --line: rgba(112, 83, 53, 0.14);
      --ink: #20150f;
      --muted: #74604f;
      --accent: #0e7c66;
      --accent-strong: #095847;
      --accent-soft: rgba(14, 124, 102, 0.12);
      --warn: #d97706;
      --warn-soft: rgba(217, 119, 6, 0.14);
      --danger: #b42318;
      --danger-soft: rgba(180, 35, 24, 0.12);
      --good: #12715b;
      --shadow: 0 24px 60px rgba(44, 28, 17, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --max: 1580px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 28%),
        linear-gradient(135deg, #efe6d7 0%, #f7f1e7 42%, #ede7dc 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
    }

    .app-shell {
      min-height: 100vh;
      padding: 28px;
    }

    .frame {
      max-width: var(--max);
      margin: 0 auto;
      border: 1px solid var(--line);
      background: rgba(255, 251, 245, 0.64);
      box-shadow: var(--shadow);
      border-radius: 34px;
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 26px 30px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 250, 242, 0.92), rgba(255, 250, 242, 0.74));
    }

    .topbar-editor {
      align-items: stretch;
      gap: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f8e74, #084c3d);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.34);
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .title-lg {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 0.95;
      margin: 0;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 10px 0 0;
      max-width: 740px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }

    .project-hero {
      flex: 1 1 0;
      min-width: 0;
      display: grid;
      align-content: start;
    }

    .project-command-panel {
      width: min(520px, 100%);
      display: grid;
      gap: 14px;
      align-content: start;
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(112, 83, 53, 0.12);
      background: rgba(255, 255, 255, 0.6);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.48);
    }

    .command-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .command-row.compact .btn,
    .command-row.compact .chip {
      min-height: 40px;
    }

    .command-download {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(112, 83, 53, 0.12);
    }

    .command-download .select {
      min-height: 46px;
      padding-top: 0;
      padding-bottom: 0;
      background: transparent;
      border-color: rgba(112, 83, 53, 0.12);
    }

    .topbar-actions,
    .toolbar,
    .chip-row,
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.8);
      color: var(--ink);
      font-weight: 700;
      transition: 180ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(14, 124, 102, 0.28);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      border-color: transparent;
    }

    .btn-soft {
      background: var(--accent-soft);
      color: var(--accent-strong);
      border-color: transparent;
    }

    .btn-danger-soft {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: transparent;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(360px, 0.9fr);
      min-height: calc(100vh - 180px);
      gap: 0;
    }

    .workspace,
    .sidebar {
      min-width: 0;
    }

    .workspace {
      padding: 36px 34px 42px;
      border-right: 1px solid var(--line);
    }

    .stack {
      display: grid;
      gap: 28px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-title h2,
    .panel-title h3,
    .panel-title h4,
    .panel-title p {
      margin: 0;
    }

    .panel-kicker {
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 5px;
    }

    .panel-headline {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .panel-copy {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 660px;
    }

    .grid-2,
    .grid-3,
    .grid-4 {
      display: grid;
      gap: 18px;
      align-items: start;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .field {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .field label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.3;
    }

    .brief-layout {
      display: grid;
      gap: 24px;
      margin-top: 10px;
    }

    .textarea-keywords {
      min-height: 138px;
    }

    .textarea-notes {
      min-height: 150px;
    }

    .input,
    .select,
    .textarea,
    .editor {
      width: 100%;
      border: 1px solid rgba(112, 83, 53, 0.16);
      background: rgba(255, 255, 255, 0.86);
      border-radius: 16px;
      padding: 14px 16px;
      color: var(--ink);
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .input:focus,
    .select:focus,
    .textarea:focus,
    .editor:focus {
      border-color: rgba(14, 124, 102, 0.45);
      box-shadow: 0 0 0 4px rgba(14, 124, 102, 0.1);
    }

    .textarea {
      resize: vertical;
      min-height: 126px;
      line-height: 1.55;
    }

    .editor {
      min-height: 520px;
      padding: 24px;
      line-height: 1.75;
      font-size: 17px;
      overflow: auto;
    }

    .editor:empty::before {
      content: attr(data-placeholder);
      color: #a18d7c;
    }

    .editor h1,
    .editor h2,
    .editor h3 {
      margin: 1.3em 0 0.6em;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .editor h2 {
      font-size: 1.56em;
      padding-bottom: 0.2em;
      border-bottom: 1px solid rgba(112, 83, 53, 0.12);
    }

    .editor h3 {
      font-size: 1.22em;
    }

    .editor p,
    .editor ul,
    .editor ol,
    .editor blockquote {
      margin: 0 0 1em;
    }

    .editor ul,
    .editor ol {
      padding-left: 1.5em;
    }

    .toolbar {
      margin-bottom: 20px;
    }

    .tool-btn {
      min-width: 42px;
      height: 42px;
      padding: 0 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      font-weight: 800;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
    }

    .metric-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .score-card {
      padding: 18px;
      border-radius: 20px;
      color: #fff;
      position: relative;
      overflow: hidden;
      min-height: 146px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .score-card::after {
      content: "";
      position: absolute;
      inset: auto -18px -34px auto;
      width: 120px;
      height: 120px;
      border-radius: 32px;
      background: rgba(255,255,255,0.12);
      transform: rotate(18deg);
    }

    .score-card strong {
      display: block;
      font-size: 52px;
      line-height: 1;
      margin: 12px 0 8px;
      letter-spacing: -0.05em;
    }

    .score-card .small {
      max-width: 22ch;
      line-height: 1.35;
    }

    .score-seo {
      background: linear-gradient(135deg, #0f8e74, #095847);
    }

    .score-risk {
      background: linear-gradient(135deg, #cf5d12, #8f1c14);
    }

    .mini-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-metric {
      padding: 14px 15px;
      border-radius: 16px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(112, 83, 53, 0.12);
    }

    .mini-metric span {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .mini-metric strong {
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .breakdown {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .breakdown-row {
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .breakdown-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .breakdown-head strong {
      font-size: 15px;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(32, 21, 15, 0.08);
    }

    .progress > i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0f8e74, #0bb7aa);
    }

    .progress.warn > i {
      background: linear-gradient(90deg, #f29b38, #cf5d12);
    }

    .list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .list-item {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.74);
      border: 1px solid var(--line);
    }

    .list-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .list-item p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .status-good {
      color: var(--good);
    }

    .status-warn {
      color: var(--warn);
    }

    .status-danger {
      color: var(--danger);
    }

    .serp {
      background: #fff;
      border: 1px solid rgba(27, 31, 35, 0.08);
      border-radius: 18px;
      padding: 16px;
    }

    .serp-url {
      font-size: 13px;
      color: #1f5138;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .serp-title {
      color: #1a0dab;
      font-size: 22px;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .serp-desc {
      color: #4d5156;
      font-size: 14px;
      line-height: 1.5;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .tag {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
    }

    .tag.ok { color: var(--good); }
    .tag.warn { color: var(--warn); }
    .tag.danger { color: var(--danger); }

    .sidebar {
      padding: 36px 30px 42px;
      background: linear-gradient(180deg, rgba(255,249,242,0.8), rgba(248,243,235,0.94));
      overflow: auto;
    }

    .sidebar-stack {
      display: grid;
      gap: 18px;
    }

    .sidebar-shell {
      padding: 18px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: rgba(255, 252, 247, 0.76);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .sidebar-shell-head {
      display: grid;
      gap: 6px;
      margin-bottom: 16px;
    }

    .editor-header {
      display: grid;
      gap: 18px;
      margin-bottom: 10px;
    }

    .editor-actions-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 4px;
    }

    .project-surface {
      display: grid;
      gap: 30px;
    }

    .project-card-open {
      cursor: pointer;
    }

    .project-card-open:hover {
      border-color: rgba(14, 124, 102, 0.24);
    }

    .filters-bar {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 0.8fr;
      gap: 14px;
      margin: 18px 0 26px;
    }

    .filter-box {
      display: grid;
      gap: 8px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.66);
    }

    .filter-box label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 800;
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .brand-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 900;
      border: 1px solid transparent;
    }

    .brand-pill.emic {
      background: rgba(180, 35, 24, 0.08);
      color: var(--danger);
      border-color: rgba(180, 35, 24, 0.12);
    }

    .brand-pill.lavance {
      background: rgba(14, 124, 102, 0.1);
      color: var(--accent-strong);
      border-color: rgba(14, 124, 102, 0.14);
    }

    .section-anchor {
      scroll-margin-top: 36px;
    }

    .focus-ring {
      animation: pulseTarget 1.3s ease;
    }

    @keyframes pulseTarget {
      0% { box-shadow: 0 0 0 0 rgba(14, 124, 102, 0.34); }
      100% { box-shadow: 0 0 0 14px rgba(14, 124, 102, 0); }
    }

    .priority-link {
      cursor: pointer;
      transition: 180ms ease;
    }

    .priority-link:hover {
      transform: translateY(-1px);
      border-color: rgba(14, 124, 102, 0.28);
      box-shadow: 0 12px 24px rgba(44, 28, 17, 0.08);
    }

    .priority-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
    }

    .tab-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      padding: 8px;
      border-radius: 22px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(112, 83, 53, 0.1);
    }

    .tab {
      flex: 1;
      min-height: 42px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: transparent;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .tab.active {
      background: #f1f7f4;
      color: var(--accent-strong);
      border-color: rgba(14, 124, 102, 0.12);
    }

    .dashboard {
      padding: 32px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 22px;
    }

    .project-card {
      background: rgba(255,255,255,0.76);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 22px;
      display: grid;
      gap: 18px;
      transition: 180ms ease;
    }

    .project-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(44, 28, 17, 0.09);
    }

    .project-card h3,
    .project-card p {
      margin: 0;
    }

    .project-card-head {
      display: grid;
      gap: 12px;
    }

    .project-card-title {
      display: grid;
      gap: 8px;
    }

    .project-card-title h3 {
      font-size: 19px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      max-width: 34ch;
    }

    .project-card-summary {
      color: var(--muted);
      line-height: 1.5;
      max-width: 60ch;
    }

    .project-card-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .project-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      padding-top: 8px;
      border-top: 1px solid rgba(112, 83, 53, 0.08);
    }

    .empty {
      padding: 34px;
      border-radius: 26px;
      border: 1px dashed rgba(112, 83, 53, 0.26);
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.45);
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 13px;
    }

    .tight {
      line-height: 1.45;
    }

    @media (max-width: 1180px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .workspace {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }

    @media (max-width: 880px) {
      .app-shell,
      .workspace,
      .sidebar,
      .dashboard {
        padding: 18px;
      }

      .topbar {
        padding: 18px;
        flex-direction: column;
        align-items: stretch;
      }

      .project-command-panel {
        width: 100%;
      }

      .command-download {
        grid-template-columns: 1fr;
      }

      .grid-2,
      .grid-3,
      .grid-4,
      .metric-cards,
      .mini-metrics,
      .filters-bar {
        grid-template-columns: 1fr;
      }

      .title-lg {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="frame" id="app"></div>
  </div>

  <script>
    const STORAGE_KEY = "seo_content_lab_projects_v2";
    const DEFAULT_TAB = "priorities";
    const BACKUP_DB_NAME = "seo_content_lab_backup";
    const BACKUP_DB_STORE = "handles";
    const BACKUP_HANDLE_KEY = "backup-directory";
    const BACKUP_BUNDLE_FILE = "seo-content-lab-projects.json";
    const BACKUP_MANIFEST_FILE = "manifest.json";

    const state = {
      projects: loadProjects(),
      view: "dashboard",
      activeProjectId: null,
      activeTab: DEFAULT_TAB,
      sortBy: "updated-desc",
      brandFilter: "all",
      searchQuery: "",
      backup: {
        supported: typeof window.showDirectoryPicker === "function",
        configured: false,
        permission: "unknown",
        folderName: "",
        status: "Sauvegarde navigateur uniquement",
        detail: "Choisissez un dossier pour activer la sauvegarde automatique sur disque.",
        directoryHandle: null,
        lastSavedAt: "",
        syncError: ""
      }
    };

    const app = document.getElementById("app");
    let autosaveTimer = null;
    let backupTimer = null;
    let editorEl = null;
    let backupSyncPending = false;
    let backupSyncQueued = false;

    function loadProjects() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(saved) ? saved.map(normalizeProjectRecord) : [];
      } catch (error) {
        return [];
      }
    }

    function normalizeProjectRecord(project) {
      const primaryKeywords = project.primaryKeywords || project.primaryKeyword || "";
      return {
        brand: "EMIC",
        metaTitle: "",
        metaDescription: "",
        slug: "",
        canonicalUrl: "",
        primaryKeywords: "",
        secondaryKeywords: "",
        intent: "informationnelle",
        audience: "",
        notes: "",
        content: "",
        ...project,
        primaryKeywords
      };
    }

    function saveProjects() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.projects));
    }

    function fileSystemBackupSupported() {
      return typeof window.showDirectoryPicker === "function" && typeof window.indexedDB !== "undefined";
    }

    function setBackupState(patch) {
      Object.assign(state.backup, patch);
      refreshBackupUi();
    }

    function openBackupDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(BACKUP_DB_NAME, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(BACKUP_DB_STORE)) {
            db.createObjectStore(BACKUP_DB_STORE);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function idbGet(key) {
      const db = await openBackupDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_DB_STORE, "readonly");
        const store = tx.objectStore(BACKUP_DB_STORE);
        const request = store.get(key);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
      });
    }

    async function idbSet(key, value) {
      const db = await openBackupDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_DB_STORE, "readwrite");
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.objectStore(BACKUP_DB_STORE).put(value, key);
      });
    }

    async function queryDirectoryPermission(handle, requestWrite) {
      if (!handle) return false;
      const options = { mode: "readwrite" };
      if (typeof handle.queryPermission === "function") {
        const current = await handle.queryPermission(options);
        if (current === "granted") return true;
      }
      if (requestWrite && typeof handle.requestPermission === "function") {
        const granted = await handle.requestPermission(options);
        return granted === "granted";
      }
      return false;
    }

    async function initBackupDirectoryHandle() {
      if (!fileSystemBackupSupported()) {
        setBackupState({
          supported: false,
          status: "Sauvegarde disque indisponible",
          detail: "Ce navigateur ne permet pas l'écriture automatique dans un dossier local."
        });
        return;
      }

      try {
        const handle = await idbGet(BACKUP_HANDLE_KEY);
        if (!handle) {
          refreshBackupUi();
          return;
        }

        const granted = await queryDirectoryPermission(handle, false);
        setBackupState({
          configured: true,
          permission: granted ? "granted" : "prompt",
          directoryHandle: handle,
          folderName: handle.name || "",
          status: granted ? "Sauvegarde disque active" : "Dossier mémorisé, autorisation à réactiver",
          detail: granted
            ? "Les projets sont enregistrés automatiquement dans le dossier choisi."
            : "Le dossier est mémorisé, mais le navigateur demande une nouvelle autorisation pour écrire."
        });
      } catch (error) {
        setBackupState({
          status: "Échec d'initialisation du backup",
          detail: "Le dossier mémorisé n'a pas pu être rouvert automatiquement.",
          syncError: error.message || String(error)
        });
      }
    }

    async function chooseBackupFolder() {
      if (!fileSystemBackupSupported()) {
        setBackupState({
          supported: false,
          status: "Sauvegarde disque indisponible",
          detail: "Ce navigateur ne supporte pas l'accès direct au système de fichiers."
        });
        return;
      }

      try {
        const handle = await window.showDirectoryPicker({ mode: "readwrite" });
        const granted = await queryDirectoryPermission(handle, true);
        if (!granted) {
          setBackupState({
            configured: true,
            permission: "prompt",
            directoryHandle: handle,
            folderName: handle.name || "",
            status: "Autorisation refusée",
            detail: "Le dossier a été choisi mais l'autorisation d'écriture n'a pas été accordée."
          });
          return;
        }

        await idbSet(BACKUP_HANDLE_KEY, handle);
        setBackupState({
          configured: true,
          permission: "granted",
          directoryHandle: handle,
          folderName: handle.name || "",
          status: "Sauvegarde disque active",
          detail: "Les projets seront sauvegardés automatiquement dans ce dossier."
        });
        await syncBackupToDisk(true);
      } catch (error) {
        if (error && error.name === "AbortError") return;
        setBackupState({
          status: "Impossible d'activer la sauvegarde disque",
          detail: "Le dossier n'a pas pu être configuré.",
          syncError: error.message || String(error)
        });
      }
    }

    async function writeJsonFile(directoryHandle, filename, data) {
      const fileHandle = await directoryHandle.getFileHandle(filename, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(data, null, 2));
      await writable.close();
    }

    function projectFilename(project) {
      return (slugify(project.articleTitle || "") || "projet-seo") + "--" + project.id + ".json";
    }

    async function syncBackupToDisk(forcePermissionRequest = false) {
      const { directoryHandle } = state.backup;
      if (!directoryHandle || !fileSystemBackupSupported()) return false;

      const granted = await queryDirectoryPermission(directoryHandle, forcePermissionRequest);
      if (!granted) {
        setBackupState({
          permission: "prompt",
          status: "Sauvegarde disque en attente d'autorisation",
          detail: "Cliquez sur le bouton de sauvegarde pour réautoriser l'écriture dans le dossier."
        });
        return false;
      }

      const bundle = {
        exportedAt: nowIso(),
        projectCount: state.projects.length,
        projects: state.projects
      };

      const manifest = {
        updatedAt: bundle.exportedAt,
        projectCount: state.projects.length,
        files: state.projects.map((project) => ({
          id: project.id,
          title: project.articleTitle,
          brand: project.brand,
          file: "projects/" + projectFilename(project)
        }))
      };

      try {
        const projectsDirectory = await directoryHandle.getDirectoryHandle("projects", { create: true });
        await writeJsonFile(directoryHandle, BACKUP_BUNDLE_FILE, bundle);
        await writeJsonFile(directoryHandle, BACKUP_MANIFEST_FILE, manifest);

        const expectedFiles = new Set();
        for (const project of state.projects) {
          const filename = projectFilename(project);
          expectedFiles.add(filename);
          await writeJsonFile(projectsDirectory, filename, project);
        }

        if (typeof projectsDirectory.values === "function") {
          for await (const entry of projectsDirectory.values()) {
            if (entry.kind === "file" && !expectedFiles.has(entry.name)) {
              await projectsDirectory.removeEntry(entry.name);
            }
          }
        }

        setBackupState({
          configured: true,
          permission: "granted",
          status: "Sauvegarde disque active",
          detail: "Dernière écriture automatique à " + formatDate(nowIso()) + " dans " + (directoryHandle.name || "le dossier choisi") + ".",
          lastSavedAt: nowIso(),
          syncError: ""
        });
        return true;
      } catch (error) {
        setBackupState({
          status: "Erreur d'écriture backup",
          detail: "La sauvegarde locale navigateur continue, mais l'écriture sur disque a échoué.",
          syncError: error.message || String(error)
        });
        return false;
      }
    }

    function scheduleDiskBackup() {
      if (!state.backup.directoryHandle || !fileSystemBackupSupported()) return;
      window.clearTimeout(backupTimer);
      backupTimer = window.setTimeout(async () => {
        if (backupSyncPending) {
          backupSyncQueued = true;
          return;
        }
        backupSyncPending = true;
        try {
          await syncBackupToDisk(false);
        } finally {
          backupSyncPending = false;
          if (backupSyncQueued) {
            backupSyncQueued = false;
            scheduleDiskBackup();
          }
        }
      }, 700);
    }

    function uid() {
      return String(Date.now() + Math.floor(Math.random() * 1000));
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function formatDate(value) {
      return new Date(value).toLocaleString("fr-FR", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function normalizeText(value) {
      return (value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^\p{L}\p{N}\s-]/gu, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function slugify(value) {
      return normalizeText(value)
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function plainText(html) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = html || "";
      return normalizeText(wrapper.textContent || "");
    }

    function rawText(html) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = html || "";
      return (wrapper.textContent || "").replace(/\s+/g, " ").trim();
    }

    function parseKeywords(value) {
      return [...new Set(
        (value || "")
          .split(/[\n,;]+/)
          .map((item) => item.trim())
          .filter(Boolean)
      )];
    }

    function countOccurrences(keyword, text) {
      const kw = normalizeText(keyword);
      if (!kw) return 0;
      const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&").replace(/\s+/g, "\\s+");
      const regex = new RegExp("(^|\\s)" + escaped + "(?=\\s|$)", "g");
      return (text.match(regex) || []).length;
    }

    function createProject() {
      const project = {
        id: uid(),
        articleTitle: "Nouvel article SEO",
        brand: "EMIC",
        metaTitle: "",
        metaDescription: "",
        slug: "",
        canonicalUrl: "",
        primaryKeywords: "",
        secondaryKeywords: "",
        intent: "informationnelle",
        audience: "",
        notes: "",
        content: "",
        createdAt: nowIso(),
        updatedAt: nowIso()
      };
      state.projects.unshift(project);
      saveProjects();
      scheduleDiskBackup();
      openProject(project.id);
    }

    function duplicateProject(id) {
      const current = getProject(id);
      if (!current) return;
      const clone = {
        ...normalizeProjectRecord(current),
        id: uid(),
        articleTitle: current.articleTitle + " (copie)",
        createdAt: nowIso(),
        updatedAt: nowIso()
      };
      state.projects.unshift(clone);
      saveProjects();
      scheduleDiskBackup();
      render();
    }

    function deleteProject(id) {
      if (!confirm("Supprimer ce projet SEO ?")) return;
      state.projects = state.projects.filter((project) => project.id !== id);
      if (state.activeProjectId === id) {
        state.view = "dashboard";
        state.activeProjectId = null;
      }
      saveProjects();
      scheduleDiskBackup();
      render();
    }

    function getProject(id = state.activeProjectId) {
      return state.projects.find((project) => project.id === id) || null;
    }

    function primaryKeywordList(project) {
      return parseKeywords(project.primaryKeywords || project.primaryKeyword || "");
    }

    function mainPrimaryKeyword(project) {
      return primaryKeywordList(project)[0] || "";
    }

    function filteredProjects() {
      const query = normalizeText(state.searchQuery);
      const projects = state.projects.filter((project) => {
        const matchesBrand = state.brandFilter === "all" || project.brand === state.brandFilter;
        if (!matchesBrand) return false;
        if (!query) return true;
        const haystack = normalizeText([
          project.articleTitle,
          project.brand,
          project.primaryKeywords || project.primaryKeyword,
          project.secondaryKeywords
        ].join(" "));
        return haystack.includes(query);
      });

      return projects.sort((a, b) => {
        if (state.sortBy === "updated-asc") return new Date(a.updatedAt) - new Date(b.updatedAt);
        if (state.sortBy === "created-desc") return new Date(b.createdAt) - new Date(a.createdAt);
        if (state.sortBy === "created-asc") return new Date(a.createdAt) - new Date(b.createdAt);
        if (state.sortBy === "brand-asc") return String(a.brand).localeCompare(String(b.brand), "fr");
        if (state.sortBy === "brand-desc") return String(b.brand).localeCompare(String(a.brand), "fr");
        return new Date(b.updatedAt) - new Date(a.updatedAt);
      });
    }

    function backupButtonLabel() {
      if (!state.backup.supported) return "Backup indisponible";
      if (state.backup.permission === "granted") return "Changer dossier backup";
      if (state.backup.configured) return "Réactiver backup disque";
      return "Activer backup disque";
    }

    function backupChipLabel() {
      if (!state.backup.supported) return "Backup navigateur uniquement";
      if (state.backup.permission === "granted") {
        return state.backup.folderName
          ? "Backup auto: " + state.backup.folderName
          : "Backup disque actif";
      }
      if (state.backup.configured) return "Backup disque à réautoriser";
      return "Backup disque inactif";
    }

    function openProject(id) {
      state.activeProjectId = id;
      state.view = "editor";
      state.activeTab = DEFAULT_TAB;
      render();
    }

    function updateProject(patch, options = {}) {
      const project = getProject();
      if (!project) return;
      Object.assign(project, patch, { updatedAt: nowIso() });
      scheduleSave();
      if (options.refresh !== false) refreshLivePanels();
    }

    function scheduleSave() {
      window.clearTimeout(autosaveTimer);
      autosaveTimer = window.setTimeout(() => {
        saveProjects();
        scheduleDiskBackup();
      }, 250);
    }

    function editorCommand(command, value) {
      if (!editorEl) return;
      editorEl.focus();
      document.execCommand(command, false, value || null);
      updateProject({ content: editorEl.innerHTML });
    }

    function insertOutline() {
      const project = getProject();
      if (!project) return;
      const title = project.articleTitle || "Sujet";
      const primary = mainPrimaryKeyword(project) || "mot-clé principal";
      const outline = [
        "<p><strong>Introduction.</strong> Répondez dès le début à l'intention de recherche autour de " + escapeHtml(primary) + ".</p>",
        "<h2>Comprendre " + escapeHtml(title) + "</h2>",
        "<p>Cadre, enjeux, définition et contexte.</p>",
        "<h2>Méthode recommandée</h2>",
        "<p>Étapes concrètes, exemples, limites, variantes.</p>",
        "<h2>Questions fréquentes</h2>",
        "<ul><li>Question 1</li><li>Question 2</li></ul>",
        "<h2>Conclusion</h2>",
        "<p>Synthèse et prochaine action.</p>"
      ].join("");
      updateProject({ content: outline });
      if (editorEl) editorEl.innerHTML = outline;

    function exportFile(type) {
      const project = getProject();
      if (!project) return;
      const filenameBase = slugify(project.articleTitle || "article-seo") || "article-seo";
      let blob;
      let extension;

      if (type === "txt") {
        blob = new Blob([rawText(project.content)], { type: "text/plain;charset=utf-8" });
        extension = "txt";
      } else if (type === "json") {
        blob = new Blob([JSON.stringify(project, null, 2)], { type: "application/json;charset=utf-8" });
        extension = "json";
      } else {
        const html = "<!doctype html><html lang=\"fr\"><head><meta charset=\"utf-8\"><title>" +
          escapeHtml(project.metaTitle || project.articleTitle || "Article SEO") +
          "</title></head><body>" + (project.content || "") + "</body></html>";
        blob = new Blob([html], { type: "text/html;charset=utf-8" });
        extension = "html";
      }

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filenameBase + "." + extension;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function escapeHtml(value) {
      return (value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function safeCanonical(url) {
      if (!url) return "";
      try {
        return new URL(url).toString();
      } catch (error) {
        return "";
      }
    }

    function extractMetrics(project) {
      const contentHtml = project.content || "";
      const wrapper = document.createElement("div");
      wrapper.innerHTML = contentHtml;

      const text = plainText(contentHtml);
      const words = text ? text.split(" ").filter(Boolean) : [];
      const wordCount = words.length;
      const uniqueWords = new Set(words).size;
      const lexicalDiversity = wordCount ? uniqueWords / wordCount : 0;
      const sentencesRaw = rawText(contentHtml).split(/[.!?]+/).map((item) => item.trim()).filter(Boolean);
      const paragraphsRaw = Array.from(wrapper.querySelectorAll("p")).map((item) => normalizeText(item.textContent || "")).filter(Boolean);
      const avgSentenceWords = sentencesRaw.length ? wordCount / sentencesRaw.length : 0;
      const avgParagraphWords = paragraphsRaw.length ? paragraphsRaw.reduce((sum, paragraph) => sum + paragraph.split(" ").length, 0) / paragraphsRaw.length : 0;

      const headings = Array.from(wrapper.querySelectorAll("h1,h2,h3,h4")).map((heading) => ({
        tag: heading.tagName,
        text: heading.textContent.trim()
      })).filter((heading) => heading.text);
      const headingText = normalizeText(headings.map((heading) => heading.text).join(" "));

      const h2Count = headings.filter((heading) => heading.tag === "H2").length;
      const h3Count = headings.filter((heading) => heading.tag === "H3").length;
      const listCount = wrapper.querySelectorAll("ul,ol").length;
      const imageList = Array.from(wrapper.querySelectorAll("img"));
      const imageCount = imageList.length;
      const imagesWithAlt = imageList.filter((image) => (image.getAttribute("alt") || "").trim()).length;
      const strongCount = wrapper.querySelectorAll("strong,b").length;

      const links = Array.from(wrapper.querySelectorAll("a[href]")).map((link) => ({
        href: link.getAttribute("href") || "",
        anchor: normalizeText(link.textContent || "")
      }));
      const canonical = safeCanonical(project.canonicalUrl);
      const host = canonical ? new URL(canonical).hostname.replace(/^www\./, "") : "";
      const externalLinks = links.filter((link) => /^https?:\/\//i.test(link.href) && (!host || !link.href.includes(host)));
      const internalLinks = links.filter((link) => {
        if (!link.href) return false;
        if (link.href.startsWith("/") || link.href.startsWith("#")) return true;
        return host ? link.href.includes(host) : false;
      });
      const primaryKeywords = primaryKeywordList(project);
      const primary = normalizeText(primaryKeywords[0] || "");
      const normalizedPrimaries = primaryKeywords.map((keyword) => normalizeText(keyword)).filter(Boolean);
      const exactMatchAnchors = links.filter((link) => link.anchor && normalizedPrimaries.includes(link.anchor)).length;
      const secondary = parseKeywords(project.secondaryKeywords);
      const secondaryFound = secondary.filter((keyword) => countOccurrences(keyword, text) > 0);
      const introText = normalizeText(paragraphsRaw[0] || rawText(contentHtml).slice(0, 240));
      const metaTitleNorm = normalizeText(project.metaTitle);
      const metaDescriptionNorm = normalizeText(project.metaDescription);
      const articleTitleNorm = normalizeText(project.articleTitle);
      const slugNorm = normalizeText(project.slug.replace(/-/g, " "));

      const primaryCount = countOccurrences(primary, text);
      const primaryDensity = wordCount ? (primaryCount * Math.max(1, primary.split(" ").length)) / wordCount * 100 : 0;
      const primaryCoverage = normalizedPrimaries.filter((keyword) => text.includes(keyword));
      const primaryInTitle = primary && articleTitleNorm.includes(primary);
      const primaryInMetaTitle = primary && metaTitleNorm.includes(primary);
      const primaryInMetaDescription = primary && metaDescriptionNorm.includes(primary);
      const primaryInIntro = primary && introText.includes(primary);
      const primaryInSlug = primary && slugNorm.includes(primary);
      const primaryInHeadings = primary && headingText.includes(primary);

      const headingKeywordHits = secondary.filter((keyword) => headingText.includes(normalizeText(keyword))).length + (primaryInHeadings ? 1 : 0);
      const repeatedParagraphs = paragraphsRaw.filter((paragraph, index, list) => paragraph.length > 40 && list.indexOf(paragraph) !== index).length;
      const titleLen = (project.metaTitle || project.articleTitle || "").trim().length;
      const descriptionLen = (project.metaDescription || "").trim().length;
      const slugLen = (project.slug || "").trim().length;
      const readTime = Math.max(1, Math.ceil(wordCount / 180));

      const headingOrderIssues = headings.reduce((issues, heading, index) => {
        if (index === 0) return issues;
        const previousLevel = Number(headings[index - 1].tag[1]);
        const currentLevel = Number(heading.tag[1]);
        if (currentLevel - previousLevel > 1) return issues + 1;
        return issues;
      }, 0);

      return {
        text,
        wordCount,
        uniqueWords,
        lexicalDiversity,
        sentences: sentencesRaw.length,
        paragraphs: paragraphsRaw.length,
        avgSentenceWords,
        avgParagraphWords,
        headings,
        h2Count,
        h3Count,
        headingOrderIssues,
        listCount,
        imageCount,
        imagesWithAlt,
        strongCount,
        links,
        internalLinks: internalLinks.length,
        externalLinks: externalLinks.length,
        exactMatchAnchors,
        canonical,
        host,
        primary,
        primaryKeywords,
        primaryCoverage,
        secondary,
        secondaryFound,
        primaryCount,
        primaryDensity,
        primaryInTitle,
        primaryInMetaTitle,
        primaryInMetaDescription,
        primaryInIntro,
        primaryInSlug,
        primaryInHeadings,
        headingKeywordHits,
        repeatedParagraphs,
        titleLen,
        descriptionLen,
        slugLen,
        readTime
      };
    }

    function getIntentTarget(intent) {
      if (intent === "transactionnelle") return { min: 650, sweet: 1100, max: 1800 };
      if (intent === "commerciale") return { min: 900, sweet: 1500, max: 2400 };
      if (intent === "locale") return { min: 550, sweet: 950, max: 1500 };
      return { min: 900, sweet: 1600, max: 2600 };
    }

    function closenessScore(value, target, window) {
      if (!value) return 0;
      const distance = Math.abs(value - target);
      return Math.max(0, 1 - distance / window);
    }

    function scoreProject(project) {
      const metrics = extractMetrics(project);
      const target = getIntentTarget(project.intent);

      const titleScore =
        (metrics.titleLen >= 48 && metrics.titleLen <= 62 ? 2.8 : metrics.titleLen >= 40 && metrics.titleLen <= 68 ? 1.6 : 0) +
        (metrics.primaryInMetaTitle ? 1.8 : 0);

      const descriptionScore =
        (metrics.descriptionLen >= 140 && metrics.descriptionLen <= 158 ? 2.8 : metrics.descriptionLen >= 120 && metrics.descriptionLen <= 165 ? 1.4 : 0) +
        (metrics.primaryInMetaDescription ? 1.2 : 0);

      const slugScore =
        (metrics.primaryInSlug ? 1.2 : 0) +
        (metrics.slugLen >= 8 && metrics.slugLen <= 52 ? 1.2 : metrics.slugLen ? 0.5 : 0);

      const metadata = clamp(titleScore + descriptionScore + slugScore + (metrics.canonical ? 2.5 : 0), 0, 14);

      const structure =
        clamp(closenessScore(metrics.wordCount, target.sweet, Math.max(300, target.sweet - target.min - 80)) * 5, 0, 5) +
        clamp((metrics.h2Count >= 4 ? 3 : metrics.h2Count >= 2 ? 1.8 : 0) + (metrics.h3Count >= 2 ? 1.6 : metrics.h3Count >= 1 ? 0.8 : 0), 0, 4.6) +
        clamp((metrics.headingOrderIssues === 0 ? 1.6 : 0) + (metrics.paragraphs >= 5 ? 1.4 : 0) + (metrics.listCount >= 1 ? 1.4 : 0), 0, 4.4);

      const topicalCoverage =
        clamp((metrics.primaryInTitle ? 1.2 : 0) + (metrics.primaryInIntro ? 1.6 : 0) + (metrics.primaryInHeadings ? 1.8 : 0) + (metrics.primaryCount > 0 ? 1.2 : 0), 0, 5.8) +
        clamp(metrics.primaryKeywords.length ? (metrics.primaryCoverage.length / metrics.primaryKeywords.length) * 3.2 : 0, 0, 3.2) +
        clamp(metrics.secondary.length ? (metrics.secondaryFound.length / metrics.secondary.length) * 6 : 1.2, 0, 6) +
        clamp((metrics.headingKeywordHits >= 3 ? 2.2 : metrics.headingKeywordHits >= 1 ? 1.2 : 0) + (metrics.lexicalDiversity >= 0.46 ? 2.4 : metrics.lexicalDiversity >= 0.38 ? 1.2 : 0), 0, 4.6);

      const readability =
        clamp((metrics.avgSentenceWords >= 10 && metrics.avgSentenceWords <= 22 ? 3.6 : metrics.avgSentenceWords <= 28 ? 1.8 : 0) + (metrics.avgParagraphWords <= 85 ? 2.2 : metrics.avgParagraphWords <= 115 ? 1 : 0) + (metrics.listCount >= 1 ? 1.2 : 0) + (metrics.wordCount >= 500 ? 1.2 : 0), 0, 8.2);

      const linking =
        clamp((metrics.internalLinks >= 3 ? 3.5 : metrics.internalLinks >= 1 ? 1.8 : 0) + (metrics.externalLinks >= 1 ? 1.8 : 0) + (metrics.links.length >= 4 ? 1.2 : metrics.links.length >= 2 ? 0.6 : 0), 0, 6.5);

      const richMedia =
        clamp((metrics.imageCount >= 1 ? 1.8 : 0) + (metrics.imageCount && metrics.imagesWithAlt === metrics.imageCount ? 1.8 : metrics.imagesWithAlt ? 0.8 : 0), 0, 3.6);

      const technical =
        clamp((project.articleTitle.trim() ? 1.4 : 0) + (metrics.canonical ? 1.6 : 0) + (metrics.headingOrderIssues === 0 ? 1.4 : 0) + (metrics.repeatedParagraphs === 0 ? 1.4 : 0) + (metrics.strongCount <= Math.max(8, Math.ceil(metrics.wordCount / 120)) ? 1.2 : 0), 0, 7);

      const rawSeoScore = metadata + structure + topicalCoverage + readability + linking + richMedia + technical;

      const coverageGate =
        (metrics.primaryInIntro ? 1 : 0) +
        (metrics.primaryInHeadings ? 1 : 0) +
        (metrics.primaryInMetaTitle ? 1 : 0) +
        (metrics.wordCount >= target.min ? 1 : 0) +
        (metrics.h2Count >= 3 ? 1 : 0) +
        (metrics.internalLinks >= 1 ? 1 : 0) +
        (metrics.secondary.length ? (metrics.secondaryFound.length / metrics.secondary.length >= 0.5 ? 1 : 0) : 0);

      const gateMultiplier =
        coverageGate >= 6 ? 0.94 :
        coverageGate === 5 ? 0.88 :
        coverageGate === 4 ? 0.78 :
        coverageGate === 3 ? 0.68 :
        coverageGate === 2 ? 0.56 :
        0.42;

      const overOptimizationPenalty =
        (metrics.primaryDensity > 1.8 ? Math.min(7, (metrics.primaryDensity - 1.8) * 7) : 0) +
        (metrics.exactMatchAnchors >= 1 ? Math.min(4, metrics.exactMatchAnchors * 2) : 0) +
        (metrics.strongCount > Math.max(10, Math.ceil(metrics.wordCount / 90)) ? 3 : 0);

      const seoScore = clamp(Math.round(rawSeoScore * gateMultiplier - overOptimizationPenalty), 0, 100);

      const stuffingRisk =
        clamp((metrics.primaryDensity > 2.2 ? (metrics.primaryDensity - 2.2) * 18 : 0) + (metrics.primaryCount >= 18 ? 8 : 0) + (metrics.secondary.length && metrics.secondaryFound.length === 0 ? 2 : 0), 0, 35);

      const thinRisk =
        clamp((metrics.wordCount < target.min ? 10 : 0) + (metrics.lexicalDiversity < 0.27 ? 5 : 0) + (metrics.repeatedParagraphs > 0 ? 5 : 0), 0, 15);

      const manipulationRisk =
        clamp((metrics.exactMatchAnchors >= 2 ? 9 : metrics.exactMatchAnchors === 1 ? 4 : 0) + (metrics.links.length > Math.max(10, Math.ceil(metrics.wordCount / 90)) ? 6 : 0) + (metrics.externalLinks === 0 && metrics.internalLinks === 0 ? 5 : 0), 0, 20);

      const metadataRisk =
        clamp((metrics.titleLen > 70 ? 5 : 0) + (metrics.descriptionLen > 165 ? 3 : 0) + ((metrics.primaryInMetaTitle && metrics.primaryInTitle && metrics.primaryDensity > 2.4) ? 4 : 0), 0, 10);

      const structureRisk =
        clamp((metrics.headingOrderIssues > 0 ? 4 : 0) + (metrics.h2Count > 8 ? 3 : 0) + (metrics.strongCount > Math.max(12, Math.ceil(metrics.wordCount / 70)) ? 3 : 0), 0, 10);

      const uxRisk =
        clamp((metrics.avgParagraphWords > 130 ? 5 : 0) + (metrics.avgSentenceWords > 30 ? 3 : 0) + (metrics.imageCount === 0 && metrics.wordCount > 1600 ? 2 : 0), 0, 10);

      const dangerScore = Math.round(stuffingRisk + thinRisk + manipulationRisk + metadataRisk + structureRisk + uxRisk);

      const categories = [
        { label: "Metadata", points: Math.round(metadata), max: 14, note: "Title, meta description, slug et canonical." },
        { label: "Structure", points: Math.round(structure), max: 14, note: "Longueur, hiérarchie Hn, listes et lisibilité de la page." },
        { label: "Couverture sémantique", points: Math.round(topicalCoverage), max: 20, note: "Présence du sujet principal et des variantes utiles." },
        { label: "Lisibilité", points: Math.round(readability), max: 8, note: "Phrases, paragraphes et format de lecture." },
        { label: "Maillage", points: Math.round(linking), max: 7, note: "Liens internes, externes et diversité d'ancrage." },
        { label: "Rich media", points: Math.round(richMedia), max: 4, note: "Images et attributs alt." },
        { label: "Hygiène technique", points: Math.round(technical), max: 7, note: "Signaux de duplication, surcharge et propreté éditoriale." }
      ];

      const priorities = buildPriorities(project, metrics, target, seoScore, dangerScore);
      const riskSignals = buildRiskSignals(metrics, dangerScore);

      return { metrics, seoScore, dangerScore, categories, priorities, riskSignals, target };
    }

    function buildPriorities(project, metrics, target, seoScore, dangerScore) {
      const items = [];
      const primaryList = primaryKeywordList(project);

      if (!project.metaTitle.trim()) {
        items.push(["Critique", "Ajoutez un meta title dédié", "Visez 45 à 65 caractères avec le mot-clé principal et une promesse claire.", "metaTitle"]);
      } else if (metrics.titleLen > 70) {
        items.push(["Critique", "Raccourcissez le meta title", "Au-delà d'environ 70 caractères, la troncature SERP est probable.", "metaTitle"]);
      }

      if (!project.metaDescription.trim()) {
        items.push(["Critique", "Renseignez une meta description", "Elle n'est pas un facteur de ranking direct mais améliore le CTR et la compréhension de la page.", "metaDescription"]);
      }

      if (!primaryList.length) {
        items.push(["Critique", "Définissez vos mots-clés principaux", "Le modèle de scoring a besoin d'une ou plusieurs cibles principales pour mesurer la couverture et le risque de sur-optimisation.", "primaryKeywords"]);
      }

      if (metrics.wordCount < target.min) {
        items.push(["Élevée", "Renforcez la profondeur éditoriale", "Le contenu est sous le seuil cohérent pour une intention " + project.intent + ". Ajoutez contexte, preuves, objections et FAQ.", "editor"]);
      }

      if (!metrics.primaryInIntro && metrics.primary) {
        items.push(["Élevée", "Placez le sujet dans l'introduction", "Google comprend mieux l'angle si le sujet principal est explicite dans les 100 à 150 premiers mots.", "editor-intro"]);
      }

      if (metrics.h2Count < 3) {
        items.push(["Moyenne", "Structurez en H2/H3", "La page manque de segments sémantiques clairs pour couvrir les sous-intentions.", "editor-headings"]);
      }

      if (metrics.secondary.length && metrics.secondaryFound.length / Math.max(1, metrics.secondary.length) < 0.55) {
        items.push(["Moyenne", "Couvrez davantage de variantes", "Ajoutez des réponses ou blocs dédiés aux requêtes secondaires pertinentes.", "secondaryKeywords"]);
      }

      if (metrics.internalLinks === 0) {
        items.push(["Moyenne", "Ajoutez du maillage interne", "Au moins 1 à 2 liens internes vers des pages mères, cluster pages ou conversion.", "editor-links"]);
      }

      if (metrics.externalLinks === 0) {
        items.push(["Faible", "Ajoutez une source externe crédible", "Une ou deux références utiles renforcent la qualité perçue sur les contenus exigeants.", "editor-links"]);
      }

      if (metrics.imageCount === 0 && metrics.wordCount > 900) {
        items.push(["Faible", "Ajoutez un visuel ou schéma", "Utile pour l'expérience, le découpage et les opportunités d'images avec alt descriptif.", "editor"]);
      }

      if (dangerScore >= 55) {
        items.push(["Critique", "Réduisez les signaux de spam SEO", "La densité, les ancres ou le balisage donnent un profil d'optimisation agressive.", "editor"]);
      } else if (seoScore >= 78 && dangerScore <= 28) {
        items.push(["Info", "Base solide", "Le contenu est équilibré. Travaillez surtout le différenciateur éditorial et les preuves métiers.", "editor"]);
      }

      return items.slice(0, 8).map(([severity, title, body, target]) => ({ severity, title, body, target }));
    }

    function buildRiskSignals(metrics, dangerScore) {
      const signals = [];
      if (metrics.primaryDensity > 2.2) {
        signals.push({ level: "danger", title: "Densité trop agressive", text: "Le mot-clé principal dépasse la zone généralement naturelle pour un contenu éditorial. Visez plutôt la couverture du sujet que la répétition." });
      }
      if (metrics.exactMatchAnchors >= 2) {
        signals.push({ level: "warn", title: "Ancres exactes répétées", text: "Plusieurs ancres identiques au mot-clé principal peuvent ressembler à une optimisation artificielle." });
      }
      if (metrics.headingOrderIssues > 0) {
        signals.push({ level: "warn", title: "Hiérarchie Hn instable", text: "Des sauts de niveau affaiblissent la structure logique de la page." });
      }
      if (metrics.repeatedParagraphs > 0) {
        signals.push({ level: "danger", title: "Segments dupliqués", text: "Des paragraphes répétés augmentent le risque de gabarit pauvre ou de contenu peu différencié." });
      }
      if (metrics.strongCount > Math.max(12, Math.ceil(metrics.wordCount / 70))) {
        signals.push({ level: "warn", title: "Trop de mise en emphase", text: "Un excès de gras peut mimer une volonté artificielle de pousser des termes." });
      }
      if (!signals.length) {
        signals.push({ level: dangerScore < 30 ? "good" : "warn", title: dangerScore < 30 ? "Risque maîtrisé" : "Risque modéré", text: dangerScore < 30 ? "Aucun signal majeur de sur-optimisation détecté. Gardez la priorité sur l'utilité et la précision du contenu." : "Le contenu reste exploitable mais quelques signaux demandent un arbitrage avant publication." });
      }
      return signals;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function badgeClass(severity) {
      if (severity === "Critique") return "status-danger";
      if (severity === "Élevée" || severity === "Moyenne") return "status-warn";
      if (severity === "Info") return "status-good";
      return "";
    }

    function focusTarget(target) {
      if (!target) return;

      const mark = (node) => {
        if (!node) return;
        node.classList.remove("focus-ring");
        void node.offsetWidth;
        node.classList.add("focus-ring");
        node.scrollIntoView({ behavior: "smooth", block: "center" });
      };

      if (target === "editor" || target === "editor-intro" || target === "editor-headings" || target === "editor-links") {
        if (!editorEl) return;
        mark(editorEl);
        editorEl.focus();

        const range = document.createRange();
        const selection = window.getSelection();

        if (target === "editor-intro" && editorEl.firstChild) {
          range.selectNodeContents(editorEl.firstChild);
          range.collapse(true);
        } else if (target === "editor-headings") {
          const heading = editorEl.querySelector("h2,h3") || editorEl;
          range.selectNodeContents(heading);
          range.collapse(true);
        } else {
          range.selectNodeContents(editorEl);
          range.collapse(target === "editor" ? false : true);
        }

        selection.removeAllRanges();
        selection.addRange(range);
        return;
      }

      const node = document.getElementById(target);
      if (!node) return;
      mark(node.closest(".field") || node.closest(".panel") || node);
      if (typeof node.focus === "function") node.focus();
    }

    function bindPriorityTargetEvents() {
      document.querySelectorAll("[data-target]").forEach((card) => {
        card.onclick = () => focusTarget(card.dataset.target);
      });
    }

      }

      if (state.activeTab === "keywords") {
        return `

            <div>

              const headingHit = analysis.metrics.headings.some((heading) => normalizeText(heading.text).includes(normalizeText(keyword)));
              const status = count === 0 ? "danger" : count >= 1 && count <= 4 ? "good" : "warn";
              return `

                  <strong class="status-${status}">${escapeHtml(keyword)}</strong>
                  <p>Occurrences: ${count} · ${headingHit ? "présent dans un heading" : "absent des headings"}.</p>
                </li>
              `;
            }).join("") : `<li class="list-item"><strong>Variantes secondaires</strong><p>Ajoutez 5 à 12 variantes proches du sujet pour évaluer la couverture sémantique.</p></li>`}
          </ul>
        `;

      if (state.activeTab === "risks") {

      return `

              ${item.target ? `<span class="priority-meta">Aller à la zone concernée</span>` : ``}

          `).join("")}
        </ul>
      `;
    }

                        </div>
                        <div class="project-card-title">
                          <h3>${escapeHtml(project.articleTitle || "Sans titre")}</h3>
                          <p class="project-card-summary">${escapeHtml(primaryKeywords.join(", ") || "Aucune liste de mots-clés principaux définie.")}</p>
                        </div>
                      </div>
                      <div class="project-card-metrics">
                        <span class="chip">SEO ${analysis.seoScore}/100</span>
                        <span class="chip">Danger ${analysis.dangerScore}/100</span>
                        <span class="chip">${analysis.metrics.wordCount} mots</span>
                      </div>
                      <div class="project-meta">
                        <span>Modifié ${formatDate(project.updatedAt)}</span>
                        <div class="quick-actions">
                          <button class="btn btn-soft" data-action="open-project" data-stop-card="true" data-id="${project.id}">Ouvrir</button>
                          <button class="btn" data-action="duplicate-project" data-stop-card="true" data-id="${project.id}">Dupliquer</button>
                          <button class="btn btn-danger-soft" data-action="delete-project" data-stop-card="true" data-id="${project.id}">Supprimer</button>
                        </div>
                      </div>
                    </article>
                  `;
                }).join("")}
              </div>
            ` : `
              <div class="empty">
                <p><strong>${state.projects.length ? "Aucun projet ne correspond aux filtres." : "Pas encore de projet."}</strong></p>
                <p>${state.projects.length ? "Essayez une autre marque, un autre tri ou videz la recherche." : "Créez une première fiche pour démarrer un brief SEO complet, rédiger et suivre le score éditorial."}</p>
              </div>
            `}
          </div>
        </section>
      `;
    }

    function renderEditor() {
      const project = getProject();
      if (!project) {
        state.view = "dashboard";
        return renderDashboard();
      }

      const analysis = scoreProject(project);
      const serpUrl = analysis.metrics.canonical || ("https://www.votresite.fr/" + (project.slug || slugify(project.articleTitle || "")));
      const primaryKeywords = primaryKeywordList(project);

      return `
        <header class="topbar topbar-editor">
          <a class="brand project-hero" href="#" data-action="go-dashboard">
            <div class="brand-mark">SEO</div>
            <div>
              <div class="eyebrow">Projet actif</div>
              <h1 class="title-lg" id="live-project-title">${escapeHtml(project.articleTitle || "Sans titre")}</h1>
              <p class="subtitle">Le score SEO mesure surtout la qualité on-page. Le score de danger mesure les signaux de suroptimisation ou de faible qualité éditoriale. Aucun des deux ne prétend reproduire Google à l'identique.</p>
            </div>
          </a>
          <div class="project-command-panel">
            <div class="command-row compact">
              <span class="chip" data-backup-chip>${backupChipLabel()}</span>
              <button class="btn" data-action="choose-backup-folder" data-backup-button>${backupButtonLabel()}</button>
            </div>
            <div class="command-row">
              <button class="btn" data-action="go-dashboard">Retour</button>
              <button class="btn btn-soft" data-action="insert-outline">Insérer un plan</button>
            </div>
            <div class="command-download">
              <select class="select" id="export-format">
                <option value="txt">TXT</option>
                <option value="html">HTML</option>
                <option value="json">JSON</option>
              </select>
              <button class="btn btn-primary" data-action="export-project">Télécharger</button>
            </div>
          </div>
        </header>
        <div class="main-grid">
          <main class="workspace">
            <div class="editor-header">
              <div class="editor-actions-row">
                <div class="chip-row">
                  <span class="brand-pill ${String(project.brand).toLowerCase()}" id="live-project-brand">${project.brand}</span>
                  <span class="chip">Créé ${formatDate(project.createdAt)}</span>
                  <span class="chip">Mis à jour ${formatDate(project.updatedAt)}</span>
                </div>
                <div class="chip-row">
                  <button class="btn" data-action="go-dashboard">Accueil</button>
                </div>
              </div>
            </div>
            <div class="project-surface">
              <section class="panel section-anchor" id="brief-panel">
                <div class="panel-title">
                  <div>
                    <div class="panel-kicker">Brief SEO</div>
                    <h2 class="panel-headline">Cadrage éditorial</h2>
                    <p class="panel-copy">Définissez les signaux qui influencent le score: cible principale, variantes, metadata, URL, intention et notes stratégiques.</p>
                  </div>
                </div>
                <div class="brief-layout">
                  <div class="grid-2">
                    <div class="field">
                      <label for="articleTitle">Titre article / H1</label>
                      <input class="input" id="articleTitle" value="${escapeHtml(project.articleTitle)}" data-field="articleTitle" placeholder="Ex: Guide complet du netlinking en 2025">
                    </div>
                    <div class="field">
                      <label for="brand">Marque</label>
                      <select class="select" id="brand" data-field="brand">
                        <option value="EMIC" ${project.brand === "EMIC" ? "selected" : ""}>EMIC</option>
                        <option value="LAVANCE" ${project.brand === "LAVANCE" ? "selected" : ""}>LAVANCE</option>
                      </select>
                    </div>
                  </div>
                  <div class="grid-2">
                    <div class="field">
                      <label for="primaryKeywords">Mots-clés principaux</label>
                      <textarea class="textarea textarea-keywords" id="primaryKeywords" data-field="primaryKeywords" placeholder="Une cible principale par ligne ou séparée par virgule">${escapeHtml(project.primaryKeywords || project.primaryKeyword || "")}</textarea>
                    </div>
                    <div class="field">
                      <label for="secondaryKeywords">Mots-clés secondaires</label>
                      <textarea class="textarea textarea-keywords" id="secondaryKeywords" data-field="secondaryKeywords" placeholder="Une variante par ligne ou séparée par virgule">${escapeHtml(project.secondaryKeywords)}</textarea>
                    </div>
                  </div>
                  <div class="grid-2">
                    <div class="field">
                      <label for="metaTitle">Meta title</label>
                      <input class="input" id="metaTitle" value="${escapeHtml(project.metaTitle)}" data-field="metaTitle" placeholder="45-65 caractères">
                    </div>
                    <div class="field">
                      <label for="slug">Slug</label>
                      <input class="input" id="slug" value="${escapeHtml(project.slug)}" data-field="slug" placeholder="strategie-netlinking" spellcheck="false">
                    </div>
                  </div>
                  <div class="grid-3">
                    <div class="field">
                      <label for="canonicalUrl">Canonical</label>
                      <input class="input" id="canonicalUrl" value="${escapeHtml(project.canonicalUrl)}" data-field="canonicalUrl" placeholder="https://www.exemple.fr/page">
                    </div>
                    <div class="field">
                      <label for="intent">Intention</label>
                      <select class="select" id="intent" data-field="intent">
                        ${["informationnelle", "commerciale", "transactionnelle", "locale"].map((intent) => `
                          <option value="${intent}" ${project.intent === intent ? "selected" : ""}>${intent}</option>
                        `).join("")}
                      </select>
                    </div>
                    <div class="field">
                      <label for="audience">Audience</label>
                      <input class="input" id="audience" value="${escapeHtml(project.audience)}" data-field="audience" placeholder="Ex: Head of SEO, PME, e-commerce">
                    </div>
                  </div>
                  <div class="field">
                    <label for="metaDescription">Meta description</label>
                    <textarea class="textarea" id="metaDescription" data-field="metaDescription" placeholder="140-160 caractères orientés CTR">${escapeHtml(project.metaDescription)}</textarea>
                  </div>
                  <div class="field">
                    <label for="notes">Notes stratégiques</label>
                    <textarea class="textarea textarea-notes" id="notes" data-field="notes" placeholder="Promesse, angle éditorial, objections, CTA, preuves, EEAT...">${escapeHtml(project.notes)}</textarea>
                  </div>
                </div>
                <div class="tag-cloud" id="primary-keywords-cloud">
                  ${primaryKeywords.length ? primaryKeywords.map((keyword) => `<span class="tag ok">${escapeHtml(keyword)}</span>`).join("") : `<span class="tag warn">Ajoutez au moins un mot-clé principal dans la liste</span>`}
                </div>
              </section>

              <section class="panel section-anchor" id="serp-panel">
                <div class="panel-title">
                  <div>
                    <div class="panel-kicker">SERP</div>
                    <h2 class="panel-headline">Prévisualisation du snippet</h2>
                  </div>
                  <span class="chip" id="serp-title-count">${analysis.metrics.titleLen} / 65 title</span>
                </div>
                <div class="serp">
                  <div class="serp-url" id="serp-url">${escapeHtml(serpUrl || "https://www.votresite.fr/votre-slug")}</div>
                  <div class="serp-title" id="serp-title">${escapeHtml(project.metaTitle || project.articleTitle || "Titre SERP")}</div>
                  <div class="serp-desc" id="serp-desc">${escapeHtml(project.metaDescription || "Ajoutez une meta description concise, orientée bénéfice et suffisamment précise pour améliorer le CTR.")}</div>
                </div>
                <div class="tag-cloud" id="serp-tags">
                  <span class="tag ${analysis.metrics.primaryInMetaTitle ? "ok" : "warn"}">Mot-clé en title ${analysis.metrics.primaryInMetaTitle ? "oui" : "non"}</span>
                  <span class="tag ${analysis.metrics.primaryInMetaDescription ? "ok" : "warn"}">Mot-clé en description ${analysis.metrics.primaryInMetaDescription ? "oui" : "non"}</span>
                  <span class="tag ${analysis.metrics.canonical ? "ok" : "warn"}">Canonical ${analysis.metrics.canonical ? "ok" : "à renseigner"}</span>
                  <span class="tag ${analysis.metrics.slugLen >= 8 ? "ok" : "warn"}">Slug ${project.slug ? "présent" : "vide"}</span>
                </div>
              </section>

              <section class="panel section-anchor" id="editor-panel">
                <div class="panel-title">
                  <div>
                    <div class="panel-kicker">Rédaction</div>
                    <h2 class="panel-headline">Éditeur de contenu</h2>
                    <p class="panel-copy">Écrivez directement dans l'éditeur. Les analyses se recalculent à chaque saisie sur des signaux purement on-page.</p>
                  </div>
                </div>
                <div class="toolbar">
                  <button class="tool-btn" data-command="bold">B</button>
                  <button class="tool-btn" data-command="italic">I</button>
                  <button class="tool-btn" data-command="formatBlock" data-value="H2">H2</button>
                  <button class="tool-btn" data-command="formatBlock" data-value="H3">H3</button>
                  <button class="tool-btn" data-command="formatBlock" data-value="P">P</button>
                  <button class="tool-btn" data-command="insertUnorderedList">• Liste</button>
                  <button class="tool-btn" data-command="insertOrderedList">1. Liste</button>
                  <button class="tool-btn" data-action="insert-link">Lien</button>
                </div>
                <div
                  id="editor"
                  class="editor"
                  contenteditable="true"
                  spellcheck="true"
                  data-placeholder="Rédigez ici votre contenu SEO: intro, H2/H3, angles de réponse, preuves, FAQ, CTA..."
                ></div>
              </section>
            </div>
          </main>

          <aside class="sidebar">
            <div class="sidebar-stack">
              <section class="sidebar-shell">
                <div class="sidebar-shell-head">
                  <div class="panel-kicker">Pilotage</div>
                  <div class="small muted">Même langage visuel pour les scores, les métriques rapides et l'analyse détaillée.</div>
                </div>
                <div class="metric-cards">
                  <section class="score-card score-seo">
                    <div class="eyebrow" style="color: rgba(255,255,255,0.72);">Score SEO</div>
                    <strong id="seo-score-value">${analysis.seoScore}</strong>
                    <div class="small">Équilibre on-page entre metadata, structure, couverture sémantique et UX de lecture.</div>
                  </section>
                  <section class="score-card score-risk">
                    <div class="eyebrow" style="color: rgba(255,255,255,0.72);">Danger SEO</div>
                    <strong id="danger-score-value">${analysis.dangerScore}</strong>
                    <div class="small">Risque de signaux artificiels: stuffing, ancres agressives, thin content, surcharge.</div>
                  </section>
                </div>

                <div class="mini-metrics">
                  <div class="mini-metric"><span>Mots</span><strong id="mini-word-count">${analysis.metrics.wordCount}</strong></div>
                  <div class="mini-metric"><span>Lecture</span><strong id="mini-read-time">${analysis.metrics.readTime} min</strong></div>
                  <div class="mini-metric"><span>Internes</span><strong id="mini-internal-links">${analysis.metrics.internalLinks}</strong></div>
                  <div class="mini-metric"><span>Externes</span><strong id="mini-external-links">${analysis.metrics.externalLinks}</strong></div>
                </div>
              </section>

            <section class="panel sidebar-shell">
              <div class="tab-row">
                ${[
                  ["priorities", "Actions"],
                  ["breakdown", "Score"],
                  ["keywords", "Keywords"],
                  ["risks", "Risques"]
                ].map(([tab, label]) => `
                  <button class="tab ${state.activeTab === tab ? "active" : ""}" data-action="switch-tab" data-tab="${tab}">${label}</button>
                `).join("")}
              </div>

              <div id="analysis-tab-content">${renderActiveTabContent(project, analysis)}</div>
            </section>
            </div>
          </aside>
        </div>
      `;
    }

    function bindEvents() {
      document.querySelectorAll("[data-action='create-project']").forEach((button) => {
        button.onclick = createProject;
      });

      document.querySelectorAll("[data-action='choose-backup-folder']").forEach((button) => {
        button.onclick = chooseBackupFolder;
      });

      document.querySelectorAll("[data-action='open-project']").forEach((button) => {
        button.onclick = (event) => {
          if (button.dataset.stopCard === "true") event.stopPropagation();
          openProject(button.dataset.id);
        };
      });

      document.querySelectorAll("[data-action='duplicate-project']").forEach((button) => {
        button.onclick = (event) => {
          if (button.dataset.stopCard === "true") event.stopPropagation();
          duplicateProject(button.dataset.id);
        };
      });

      document.querySelectorAll("[data-action='delete-project']").forEach((button) => {
        button.onclick = (event) => {
          if (button.dataset.stopCard === "true") event.stopPropagation();
          deleteProject(button.dataset.id);
        };
      });

      document.querySelectorAll("[data-action='go-dashboard']").forEach((button) => {
        button.onclick = (event) => {
          event.preventDefault();
          state.view = "dashboard";
          state.activeProjectId = null;
          render();
        };
      });

      document.querySelectorAll(".project-card-open").forEach((card) => {
        card.onclick = () => openProject(card.dataset.id);
      });

      document.querySelectorAll("[data-action='switch-tab']").forEach((button) => {
        button.onclick = () => {
          state.activeTab = button.dataset.tab;
          render();
        };
      });

      document.querySelectorAll("[data-action='insert-outline']").forEach((button) => {
        button.onclick = insertOutline;
      });

      document.querySelectorAll("[data-action='export-project']").forEach((button) => {
        button.onclick = () => {
          const formatSelect = document.getElementById("export-format");
          exportFile(formatSelect ? formatSelect.value : "txt");
        };
      });

      document.querySelectorAll("[data-field]").forEach((element) => {
        const handler = () => {
          const field = element.dataset.field;
          const patch = {};
          patch[field] = element.value;
          if (field === "articleTitle") {
            const project = getProject();
            if (project && !project.slug.trim()) patch.slug = slugify(element.value);
          }
          updateProject(patch);
        };
        element.oninput = handler;
        element.onchange = handler;
      });

      document.querySelectorAll("[data-dashboard-field]").forEach((element) => {
        const handler = () => {
          state[element.dataset.dashboardField] = element.value;
          render();
        };
        element.oninput = handler;
        element.onchange = handler;
      });

      document.querySelectorAll("[data-command]").forEach((button) => {
        button.onclick = () => editorCommand(button.dataset.command, button.dataset.value);
      });

      document.querySelectorAll("[data-action='insert-link']").forEach((button) => {
        button.onclick = () => {
          const url = prompt("URL du lien", "https://");
          if (url) editorCommand("createLink", url);
        };
      });

      bindPriorityTargetEvents();

      if (editorEl) {
        editorEl.oninput = () => updateProject({ content: editorEl.innerHTML });
      }
    }

    render();
    initBackupDirectoryHandle();
  </script>
</body>
</html>
